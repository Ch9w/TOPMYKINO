<body onload="searchMovie()">
  <div>
    <!--Начало шапки-->
    <header>
      <div class="header-1">
        <a class="logo" href="../index.html">TOPMYKINO</a>
      </div>

      <div class="ph1">
        Список фильмов

        <div class="article article1 res1">
          <img src="../assets/img/beekeeper.png" title="BEEKEEPER" alt="BEEKEEPER" />

        <div class="article article2 res2">
          <img src="../assets/img/maingeroi(600-800).jpg" title="Главный герой" alt="Главный герой" />

        </div>
        <div class="article article4 res4">
          <img src="../assets/img/kitchen.jpg" title="Кухня" alt="Кухня" />
        </div>
        <div class="article article1 res5">
          <img src="../assets/img/elki5.png" title="Ёлки 5" alt="Ёлки 5" />
        </div>
        <div class="article article2 res6">
          <img src="../assets/img/gemini.png" title="GEMINI" alt="GEMINI" />
        </div>
      </div>
      <div id="notFound"></div>
    </div>

    <!--Начало подвала-->
    <hr />
    <footer>
      <div class="footer-1">
        <p class="footerP">Техническая поддержка</p>

        </p>

        <a href="./technicalSupport.html" class="btnWrite">Написать</a>
      </div>
      <div class="footer-2">
        <p class="footerP"><a href="#">Пользовательское соглашение</a></p>
